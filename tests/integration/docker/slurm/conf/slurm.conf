# =============================================================================
# Slurm configuration — learning cluster
# =============================================================================
# This is a minimal, functional configuration tuned for running inside Docker
# containers.  Several options that would normally be required in production
# are relaxed or disabled to avoid needing special kernel capabilities.
#
# Key container-friendly choices:
#   ProctrackType=proctrack/linuxproc  — no cgroup process tracking
#   TaskPlugin=task/none               — no CPU-affinity / cgroup task binding
#   CgroupPlugin=disabled (cgroup.conf)— disables cgroup subsystem entirely
# =============================================================================

# -----------------------------------------------------------------------------
# Identity
# -----------------------------------------------------------------------------
ClusterName=learn-cluster

# The hostname of the machine running slurmctld.
# This MUST match the container hostname set in docker-compose.yml.
SlurmctldHost=slurm-login

# -----------------------------------------------------------------------------
# Authentication — munge shared key baked into the Docker image
# -----------------------------------------------------------------------------
AuthType=auth/munge
CredType=cred/munge

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid

# -----------------------------------------------------------------------------
# Scheduler
# -----------------------------------------------------------------------------
SchedulerType=sched/backfill

# cons_tres (consumable tracking resources) enables per-core scheduling.
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# -----------------------------------------------------------------------------
# State persistence
# -----------------------------------------------------------------------------
StateSaveLocation=/var/spool/slurm
SlurmdSpoolDir=/var/spool/slurm/slurmd

# -----------------------------------------------------------------------------
# Timeouts — shortened for a learning environment so failures surface quickly
# -----------------------------------------------------------------------------
SlurmctldTimeout=120
SlurmdTimeout=300
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# -----------------------------------------------------------------------------
# Network ports
# -----------------------------------------------------------------------------
SlurmctldPort=6817
SlurmdPort=6818

# -----------------------------------------------------------------------------
# MPI integration
# -----------------------------------------------------------------------------
# Tell srun to use PMIx as its process-management interface.
# With MpiDefault=pmix, running `srun ./my_mpi_program` is enough — no need
# to add --mpi=pmix explicitly.  This requires both Slurm and the MPI library
# to be built with PMIx support (--with-pmix at configure time).
MpiDefault=pmix

# -----------------------------------------------------------------------------
# Container-friendly process / task tracking
# -----------------------------------------------------------------------------
# linuxproc: tracks processes via /proc instead of cgroups — works in Docker
ProctrackType=proctrack/linuxproc

# task/none: disables CPU affinity binding, which requires cgroup support
TaskPlugin=task/none

# Automatically return nodes to service once slurmd reconnects.
# Very useful in a learning environment where containers restart frequently.
ReturnToService=2

# -----------------------------------------------------------------------------
# Node definitions
# -----------------------------------------------------------------------------
# CPUs=2        — two virtual CPUs per container
# RealMemory=512 — advertise 512 MB; conservative so jobs aren't rejected
#                  even if the container has less free RAM reported by Slurm
# State=UNKNOWN — lets nodes register themselves when slurmd starts
NodeName=slurm-compute[1-2] CPUs=2 RealMemory=512 State=UNKNOWN

# -----------------------------------------------------------------------------
# Partitions (queues)
# -----------------------------------------------------------------------------
# A single default partition containing both compute nodes.
# MaxTime=INFINITE is fine for a learning cluster.
PartitionName=main Nodes=slurm-compute[1-2] Default=YES MaxTime=INFINITE State=UP
