# =============================================================================
# Slurm cgroup configuration
# =============================================================================
# CgroupPlugin=disabled tells Slurm not to attempt any cgroup operations.
#
# Why this matters in Docker:
#   By default Slurm tries to use Linux cgroups to track and constrain jobs.
#   Docker containers do not have full cgroup namespace access unless the
#   container is run with --privileged AND the host kernel exposes the right
#   subsystems.  Even with privileged mode this is fragile and varies by
#   host distribution / Docker version.
#
#   Setting CgroupPlugin=disabled (combined with ProctrackType=proctrack/linuxproc
#   and TaskPlugin=task/none in slurm.conf) gives a fully functional scheduler
#   without needing any cgroup support from the container runtime.
#
# Production note:
#   In a real HPC cluster you would use CgroupPlugin=cgroup/v2 (or v1) to
#   enforce memory limits, CPU quotas, and device access per job.
# =============================================================================

CgroupPlugin=disabled
