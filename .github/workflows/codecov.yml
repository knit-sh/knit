name: Code Coverage

on:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install kcov
        run: |
          wget -q https://github.com/SimonKagstrom/kcov/releases/download/v42/kcov-amd64.tar.gz
          sudo tar xzf kcov-amd64.tar.gz -C /
          rm kcov-amd64.tar.gz

      - name: Build knit.sh for coverage
        run: make coverage

      - name: Run tests with coverage
        run: kcov --include-path=src coverage/ bats tests/test_*.sh

      - name: Fix coverage paths
        run: |
          # kcov records <source> as an absolute path to src/ and filenames
          # as bare names (e.g. "log.sh"). Codecov needs paths relative to the
          # repo root (e.g. "src/log.sh"). Fix by setting <source> to the repo
          # root and prepending "src/" to each filename.
          xml=$(find coverage -name cobertura.xml -path '*/bats*/cobertura.xml' | head -1)
          sed -i "s|<source>.*</source>|<source>.</source>|" "$xml"
          sed -i 's|filename="\([^"]*\)"|filename="src/\1"|g' "$xml"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/*/cobertura.xml
          fail_ci_if_error: true
