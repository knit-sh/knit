name: Code Coverage

on:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats cmake pkg-config libdw-dev libcurl4-openssl-dev

      - name: Build and install kcov
        run: |
          wget -q https://github.com/SimonKagstrom/kcov/archive/refs/tags/v43.tar.gz
          tar xzf v43.tar.gz
          cmake -S kcov-43 -B kcov-43/build
          make -C kcov-43/build -j"$(nproc)"
          sudo make -C kcov-43/build install
          rm -rf kcov-43 v43.tar.gz

      - name: Build knit.sh for coverage
        run: make coverage

      - name: Run tests with coverage
        run: kcov --include-path=src coverage/ bats tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/*/cobertura.xml
          fail_ci_if_error: true
