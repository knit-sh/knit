name: Code Coverage

on:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats sqlite3 libdw-dev libcurl4-openssl-dev

      - name: Cache kcov
        id: cache-kcov
        uses: actions/cache@v4
        with:
          path: ~/.kcov
          key: kcov-v43-${{ runner.os }}

      - name: Build and install kcov
        if: steps.cache-kcov.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y cmake pkg-config
          wget -q https://github.com/SimonKagstrom/kcov/archive/refs/tags/v43.tar.gz
          tar xzf v43.tar.gz
          cmake -S kcov-43 -B kcov-43/build -DCMAKE_INSTALL_PREFIX="${HOME}/.kcov"
          make -C kcov-43/build -j"$(nproc)"
          make -C kcov-43/build install
          rm -rf kcov-43 v43.tar.gz

      - name: Add kcov to PATH
        run: echo "${HOME}/.kcov/bin" >> "${GITHUB_PATH}"

      - name: Build knit.sh for coverage
        run: make coverage

      - name: Run tests with coverage
        run: kcov --include-path=src coverage/ bats tests/test_*.sh

      - name: Fix coverage paths
        run: |
          # kcov records <source> as an absolute path to src/ and filenames
          # as bare names (e.g. "log.sh"). Codecov needs paths relative to the
          # repo root (e.g. "src/log.sh"). Fix by setting <source> to the repo
          # root and prepending "src/" to each filename.
          xml=$(find coverage -name cobertura.xml -path '*/bats*/cobertura.xml' | head -1)
          sed -i "s|<source>.*</source>|<source>.</source>|" "$xml"
          sed -i 's|filename="\([^"]*\)"|filename="src/\1"|g' "$xml"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/*/cobertura.xml
          fail_ci_if_error: true
